<html>
    <head>
        <meta charset="UTF-8">
        <title>CSS model example</title>
        <style type="text/CSS">
            .example1 {
              width: 228px;  
              background-color: yellow;
              padding: 0px;
              border:0px;
              margin: 0px;
            }
            .example2 {
                width: 220px;
                background-color:green;
                padding: 50px;
                border:40px solid black;
                margin:48px 28px;
            }
            hr{
                background-color: red;

            }
        </style>
    </head>
    <body>
        <h1>box model example</h1>
        <hr>
        <p class="example1">my content example</p>
        <hr style="width: 10%; height: 10px; color:blue;">
        <p class="example2">my content example2</p>
        <hr style="width: 20%; height: 1px; color:blue;">
    </body>
</html>
